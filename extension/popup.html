<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #030712;
      --card: #1f2937;
      --primary: #6366f1;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #374151;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    h2 {
      margin: 0 0 4px 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: white;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    button {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .job-preview {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .job-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }
    .job-company {
      font-size: 12px;
      color: var(--muted);
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <h2>JobTracker Sync</h2>
  <div className="subtitle">Save jobs with one click</div>

  <div id="setup-view">
    <div className="form-group">
      <label>Server URL</label>
      <input type="text" id="server-url" placeholder="http://localhost:3000" />
    </div>
    <div className="form-group">
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="Enter your extension API Key" />
    </div>
    <button id="save-settings">Save Settings</button>
  </div>

  <div id="capture-view" style="display: none;">
    <div className="job-preview" id="job-preview">
      <div className="job-title" id="preview-title">Software Engineer</div>
      <div className="job-company" id="preview-company">Google</div>
    </div>
    <button id="sync-now">Sync to JobTracker</button>
    <button id="edit-settings" style="background: transparent; border: 1px solid var(--border); margin-top: 8px;">Settings</button>
  </div>

  <div id="status-msg" className="status"></div>

  <script src="popup.js"></script>
</body>
</html>
